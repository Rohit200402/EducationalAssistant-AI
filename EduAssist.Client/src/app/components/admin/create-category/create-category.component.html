<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-plus me-2"></i>Create Category</h2></div>
  <div class="card"><div class="card-body">
    <form (ngSubmit)="submit()">
      <div class="mb-3"><label class="form-label">Subject Name</label><input class="form-control" [(ngModel)]="subjectName" name="subjectName" required placeholder="e.g., Mathematics, Physics"></div>
      <div class="mb-3"><label class="form-label">Description</label><input class="form-control" [(ngModel)]="description" name="description" placeholder="Brief description of the category"></div>
      <div class="mb-3"><label class="form-label">System Prompt</label><textarea class="form-control" [(ngModel)]="systemPrompt" name="systemPrompt" rows="4" placeholder="Custom AI system prompt for this category (optional). e.g., You are a math tutor who explains concepts step by step..."></textarea><small class="text-muted">This prompt will be used by the AI when answering questions in this category.</small></div>
      <div class="d-flex gap-2"><button type="submit" class="btn btn-primary" [disabled]="loading"><i class="fas fa-save me-1"></i>Create</button><a routerLink="/admin/categories" class="btn btn-secondary">Cancel</a></div>
    </form>
  </div></div>
</div>
<app-footer></app-footer>
