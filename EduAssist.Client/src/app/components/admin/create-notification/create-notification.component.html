<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>Create Notification</h2>
    <p>Broadcast a notification to all users</p>
  </div>

  <div class="animate-fade-in">
    <div class="form-card">
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Title <span class="required">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="title" name="title" placeholder="Notification title" required>
        </div>
        <div class="form-group">
          <label class="form-label">Message <span class="required">*</span></label>
          <textarea class="form-control" [(ngModel)]="message" name="message" rows="4" placeholder="Write the notification message..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" [(ngModel)]="type" name="type">
            <option value="announcement">Announcement</option>
            <option value="reminder">Reminder</option>
            <option value="info">Info</option>
          </select>
        </div>
        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          <i *ngIf="!loading" class="fas fa-bullhorn me-1"></i>{{ loading ? 'Sending...' : 'Broadcast' }}
        </button>
      </form>
    </div>
  </div>
</div>
<app-footer></app-footer>
