<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-user-plus me-2"></i>Create User</h2></div>
  <div class="card"><div class="card-body">
    <form (ngSubmit)="submit()">
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">First Name</label><input class="form-control" [(ngModel)]="form.firstName" name="firstName" required></div>
        <div class="col-md-6 mb-3"><label class="form-label">Last Name</label><input class="form-control" [(ngModel)]="form.lastName" name="lastName" required></div>
      </div>
      <div class="mb-3"><label class="form-label">Display Name</label><input class="form-control" [(ngModel)]="form.displayName" name="displayName" required></div>
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Email</label><input type="email" class="form-control" [(ngModel)]="form.email" name="email" required></div>
        <div class="col-md-6 mb-3"><label class="form-label">Username</label><input class="form-control" [(ngModel)]="form.userName" name="userName" required></div>
      </div>
      <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" [(ngModel)]="form.password" name="password" required></div>
      <div class="row">
        <div class="col-md-4 mb-3"><label class="form-label">Institution</label><input class="form-control" [(ngModel)]="form.institution" name="institution"></div>
        <div class="col-md-4 mb-3"><label class="form-label">Grade</label><input class="form-control" [(ngModel)]="form.grade" name="grade"></div>
        <div class="col-md-4 mb-3"><label class="form-label">Role</label><select class="form-select" [(ngModel)]="form.role" name="role"><option value="User">User</option><option value="Admin">Admin</option></select></div>
      </div>
      <div class="mb-3"><label class="form-label">Bio</label><textarea class="form-control" [(ngModel)]="form.bio" name="bio" rows="3"></textarea></div>
      <div class="d-flex gap-2"><button type="submit" class="btn btn-primary" [disabled]="loading"><i class="fas fa-save me-1"></i>Create</button><a routerLink="/admin/users" class="btn btn-secondary">Cancel</a></div>
    </form>
  </div></div>
</div>
<app-footer></app-footer>
