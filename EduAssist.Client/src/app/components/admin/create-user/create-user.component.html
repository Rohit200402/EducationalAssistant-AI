<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2><i class="fas fa-user-plus me-2"></i>Create User</h2>
    <p>Add a new user to the platform</p>
  </div>

  <div class="form-card">
    <div class="form-card-header">
      <h5><i class="fas fa-id-card me-2"></i>User Information</h5>
    </div>
    <div class="form-card-body">
      <form (ngSubmit)="submit()">
        <!-- Personal Information -->
        <div class="form-section">
          <div class="form-section-title">Personal Information</div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input class="form-control" [(ngModel)]="form.firstName" name="firstName" required placeholder="Enter first name">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name</label>
              <input class="form-control" [(ngModel)]="form.lastName" name="lastName" required placeholder="Enter last name">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Display Name</label>
            <input class="form-control" [(ngModel)]="form.displayName" name="displayName" required placeholder="Public display name">
          </div>
        </div>

        <!-- Account Information -->
        <div class="form-section">
          <div class="form-section-title">Account Details</div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="form.email" name="email" required placeholder="user@example.com">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" [(ngModel)]="form.userName" name="userName" required placeholder="Unique username">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="form.password" name="password" required placeholder="Secure password">
          </div>
        </div>

        <!-- Additional Information -->
        <div class="form-section">
          <div class="form-section-title">Additional Details</div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Institution</label>
              <input class="form-control" [(ngModel)]="form.institution" name="institution" placeholder="School or organization">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Grade</label>
              <input class="form-control" [(ngModel)]="form.grade" name="grade" placeholder="e.g., 10th">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Role</label>
              <select class="form-select" [(ngModel)]="form.role" name="role">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Bio</label>
            <textarea class="form-control" [(ngModel)]="form.bio" name="bio" rows="3" placeholder="Brief bio (optional)"></textarea>
          </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <button type="submit" class="btn-form-primary" [disabled]="loading">
            <i class="fas fa-save me-1"></i>Create User
          </button>
          <a routerLink="/admin/users" class="btn-form-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<app-footer></app-footer>
