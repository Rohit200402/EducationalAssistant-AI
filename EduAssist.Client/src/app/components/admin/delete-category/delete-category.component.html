<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2><i class="fas fa-trash me-2"></i>Delete Category</h2>
    <p>Confirm category deletion</p>
  </div>

  <div *ngIf="category" class="delete-card">
    <div class="delete-card-icon">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <div class="delete-card-content">
      <h4>Are you sure you want to delete this category?</h4>
      <p class="delete-card-desc">This action will permanently remove this category. Questions associated with it may be affected.</p>

      <div class="item-detail-card">
        <div class="item-detail-icon">
          <i class="fas fa-folder-open"></i>
        </div>
        <div class="item-detail-info">
          <div class="item-detail-name">{{ category.subjectName }}</div>
        </div>
      </div>

      <div class="delete-actions">
        <button class="btn-danger" (click)="confirm()" [disabled]="loading">
          <i class="fas fa-trash me-1"></i>Delete
        </button>
        <a routerLink="/admin/categories" class="btn-cancel">Cancel</a>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
