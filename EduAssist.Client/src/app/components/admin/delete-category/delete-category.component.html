<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-trash me-2"></i>Delete Category</h2></div>
  <div *ngIf="category" class="card"><div class="card-body text-center">
    <i class="fas fa-exclamation-triangle text-warning" style="font-size:3rem"></i>
    <h4 class="mt-3">Are you sure you want to delete this category?</h4>
    <p class="text-muted">{{ category.subjectName }}</p>
    <div class="d-flex gap-2 justify-content-center mt-4"><button class="btn btn-danger" (click)="confirm()" [disabled]="loading"><i class="fas fa-trash me-1"></i>Delete</button><a routerLink="/admin/categories" class="btn btn-secondary">Cancel</a></div>
  </div></div>
</div>
<app-footer></app-footer>
