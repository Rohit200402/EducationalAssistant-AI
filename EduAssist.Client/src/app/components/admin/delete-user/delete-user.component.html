<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2><i class="fas fa-user-times me-2"></i>Delete User</h2>
    <p>Confirm user deactivation</p>
  </div>

  <div *ngIf="user" class="delete-card">
    <div class="delete-card-icon">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <div class="delete-card-content">
      <h4>Are you sure you want to deactivate this user?</h4>
      <p class="delete-card-desc">This action will prevent the user from accessing the platform. You can reactivate them later.</p>

      <div class="user-detail-card">
        <div class="user-detail-avatar">
          <i class="fas fa-user"></i>
        </div>
        <div class="user-detail-info">
          <div class="user-detail-name">{{ user.displayName }}</div>
          <div class="user-detail-email">{{ user.email }}</div>
        </div>
      </div>

      <div class="delete-actions">
        <button class="btn-danger" (click)="confirm()" [disabled]="loading">
          <i class="fas fa-trash me-1"></i>Deactivate
        </button>
        <a routerLink="/admin/users" class="btn-cancel">Cancel</a>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
