<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-user-times me-2"></i>Delete User</h2></div>
  <div *ngIf="user" class="card"><div class="card-body text-center">
    <i class="fas fa-exclamation-triangle text-warning" style="font-size:3rem"></i>
    <h4 class="mt-3">Are you sure you want to deactivate this user?</h4>
    <p class="text-muted">{{ user.displayName }} ({{ user.email }})</p>
    <div class="d-flex gap-2 justify-content-center mt-4"><button class="btn btn-danger" (click)="confirm()" [disabled]="loading"><i class="fas fa-trash me-1"></i>Deactivate</button><a routerLink="/admin/users" class="btn btn-secondary">Cancel</a></div>
  </div></div>
</div>
<app-footer></app-footer>
