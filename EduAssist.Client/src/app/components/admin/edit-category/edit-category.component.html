<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-edit me-2"></i>Edit Category</h2></div>
  <div class="card"><div class="card-body">
    <form (ngSubmit)="submit()">
      <div class="mb-3"><label class="form-label">Subject Name</label><input class="form-control" [(ngModel)]="subjectName" name="subjectName" required></div>
      <div class="d-flex gap-2"><button type="submit" class="btn btn-primary" [disabled]="loading"><i class="fas fa-save me-1"></i>Update</button><a routerLink="/admin/categories" class="btn btn-secondary">Cancel</a></div>
    </form>
  </div></div>
</div>
<app-footer></app-footer>
