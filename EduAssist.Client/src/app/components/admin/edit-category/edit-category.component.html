<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2><i class="fas fa-edit me-2"></i>Edit Category</h2>
    <p>Update category information and AI prompt</p>
  </div>

  <div class="form-card">
    <div class="form-card-header">
      <h5><i class="fas fa-folder me-2"></i>Category Details</h5>
    </div>
    <div class="form-card-body">
      <form (ngSubmit)="submit()">
        <div class="form-section">
          <div class="mb-3">
            <label class="form-label">Subject Name</label>
            <input class="form-control" [(ngModel)]="subjectName" name="subjectName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <input class="form-control" [(ngModel)]="description" name="description" placeholder="Brief description of the category">
          </div>
          <div class="mb-3">
            <label class="form-label">System Prompt</label>
            <textarea class="form-control" [(ngModel)]="systemPrompt" name="systemPrompt" rows="4" placeholder="Custom AI system prompt for this category"></textarea>
            <small class="form-hint">This prompt will be used by the AI when answering questions in this category.</small>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-form-primary" [disabled]="loading">
            <i class="fas fa-save me-1"></i>Update
          </button>
          <a routerLink="/admin/categories" class="btn-form-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<app-footer></app-footer>
