<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2><i class="fas fa-robot me-2"></i>All AI Responses</h2>
    <p>Browse all AI-generated answers across the platform</p>
  </div>

  <div class="search-section">
    <app-search placeholder="Search responses..." (searchChange)="onSearch($event)"></app-search>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-skeleton">
    <div class="skeleton-card" *ngFor="let s of [1,2,3]"></div>
  </div>

  <div *ngIf="!loading">
    <!-- Empty State -->
    <div *ngIf="responses.length === 0" class="empty-state">
      <i class="fas fa-robot"></i>
      <h4>No responses found</h4>
      <p>No AI responses match your search criteria</p>
    </div>

    <!-- Response Cards -->
    <div *ngIf="responses.length > 0" class="responses-list">
      <div *ngFor="let r of responses" class="response-card">
        <div class="response-card-header">
          <span class="badge-category">{{ r.categoryName }}</span>
          <span class="response-date">{{ r.createdAt | date:'short' }}</span>
        </div>
        <div class="response-card-body">
          <p class="response-question"><strong>Q:</strong> {{ r.query }}</p>
          <p class="response-answer">{{ r.response | slice:0:200 }}...</p>
        </div>
      </div>
    </div>

    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" [totalCount]="totalCount" (pageChange)="onPageChange($event)"></app-pagination>
  </div>
</div>
<app-footer></app-footer>
