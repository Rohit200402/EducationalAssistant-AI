<app-admin-navbar></app-admin-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <div class="page-header-content">
      <div>
        <h2><i class="fas fa-tags me-2"></i>Manage Categories</h2>
        <p>Manage subject categories for questions</p>
      </div>
      <a routerLink="/admin/categories/create" class="btn-primary-action">
        <i class="fas fa-plus me-1"></i>Add Category
      </a>
    </div>
  </div>

  <div class="search-section">
    <app-search placeholder="Search categories..." (searchChange)="onSearch($event)"></app-search>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-skeleton">
    <div class="skeleton-row" *ngFor="let s of [1,2,3,4,5]"></div>
  </div>

  <div *ngIf="!loading">
    <!-- Empty State -->
    <div *ngIf="categories.length === 0" class="empty-state">
      <i class="fas fa-tags"></i>
      <h4>No categories found</h4>
      <p>Create a new category to get started</p>
    </div>

    <!-- Categories Table -->
    <div class="admin-card" *ngIf="categories.length > 0">
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Subject Name</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of categories; let i = index">
              <td class="index-cell">{{ (currentPage - 1) * 5 + i + 1 }}</td>
              <td class="category-name-cell">
                <i class="fas fa-folder-open category-icon"></i>
                {{ c.subjectName }}
              </td>
              <td class="actions-cell">
                <a [routerLink]="['/admin/categories/edit', c.categoryId]" class="action-btn action-btn-edit" title="Edit category">
                  <i class="fas fa-edit"></i>
                </a>
                <a [routerLink]="['/admin/categories/delete', c.categoryId]" class="action-btn action-btn-delete" title="Delete category">
                  <i class="fas fa-trash"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" [totalCount]="totalCount" (pageChange)="onPageChange($event)"></app-pagination>
  </div>
</div>
<app-footer></app-footer>
