<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fas fa-key"></i>
      </div>
      <h2>Forgot Password</h2>
      <p>Enter your email to receive a password reset token</p>
    </div>

    <div *ngIf="!success">
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-input" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
          </div>
        </div>
        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Sending...' : 'Send Reset Token' }}
        </button>
      </form>
    </div>

    <div *ngIf="success" class="success-section">
      <div class="success-icon"><i class="fas fa-check-circle"></i></div>
      <p>Password reset token generated successfully!</p>
      <div class="token-display" *ngIf="token">
        <label class="form-label">Your Reset Token:</label>
        <div class="token-box">{{ token }}</div>
      </div>
      <a routerLink="/reset-password" class="btn-submit" style="display: block; text-align: center; text-decoration: none;">
        Reset Password
      </a>
    </div>

    <div class="auth-footer">
      <a routerLink="/login" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
    </div>
  </div>
</div>
