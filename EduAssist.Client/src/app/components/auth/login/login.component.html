<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to continue your learning journey</p>
    </div>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="form-input" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input [type]="showPassword ? 'text' : 'password'" class="form-input has-suffix" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
          <button type="button" class="input-suffix-btn" (click)="showPassword = !showPassword">
            <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    <div class="auth-divider">
      <span>or</span>
    </div>
    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
      <a routerLink="/" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
    </div>
  </div>
</div>
