<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-graduation-cap"></i>
      <h2>Welcome Back</h2>
      <p>Sign in to continue your learning journey</p>
    </div>
    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
          <button type="button" class="btn btn-outline-secondary" (click)="showPassword = !showPassword"><i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-3" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
      <a routerLink="/" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
    </div>
  </div>
</div>
