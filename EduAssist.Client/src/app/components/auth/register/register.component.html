<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fas fa-user-plus"></i>
      </div>
      <h2>Create Account</h2>
      <p>Join EduAssist and start learning smarter</p>
    </div>
    <form (ngSubmit)="register()">
      <!-- Personal Information -->
      <div class="field-section">
        <span class="field-section-label">Personal Information</span>
        <div class="field-row">
          <div class="form-group">
            <label class="form-label">First Name *</label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" class="form-input" [(ngModel)]="form.firstName" name="firstName" placeholder="First name" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name *</label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" class="form-input" [(ngModel)]="form.lastName" name="lastName" placeholder="Last name" required>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Display Name *</label>
          <div class="input-wrapper">
            <i class="fas fa-id-badge input-icon"></i>
            <input type="text" class="form-input" [(ngModel)]="form.displayName" name="displayName" placeholder="How you want to be known" required>
          </div>
        </div>
      </div>

      <!-- Account Credentials -->
      <div class="field-section">
        <span class="field-section-label">Account Credentials</span>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-input" [(ngModel)]="form.email" name="email" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Username *</label>
          <div class="input-wrapper">
            <i class="fas fa-at input-icon"></i>
            <input type="text" class="form-input" [(ngModel)]="form.userName" name="userName" placeholder="Choose a username" required>
          </div>
        </div>
        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Password *</label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input [type]="showPassword ? 'text' : 'password'" class="form-input" [(ngModel)]="form.password" name="password" placeholder="Create password" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input [type]="showPassword ? 'text' : 'password'" class="form-input" [(ngModel)]="form.confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
            </div>
          </div>
        </div>
        <div class="checkbox-wrapper">
          <input type="checkbox" class="checkbox-input" [(ngModel)]="showPassword" name="showPwd" id="showPwd">
          <label class="checkbox-label" for="showPwd">Show password</label>
        </div>
      </div>

      <!-- Optional Information -->
      <div class="field-section">
        <span class="field-section-label">Optional Information</span>
        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Institution</label>
            <div class="input-wrapper">
              <i class="fas fa-university input-icon"></i>
              <input type="text" class="form-input" [(ngModel)]="form.institution" name="institution" placeholder="School or university">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Grade/Level</label>
            <div class="input-wrapper">
              <i class="fas fa-graduation-cap input-icon"></i>
              <input type="text" class="form-input" [(ngModel)]="form.grade" name="grade" placeholder="e.g. 10th Grade">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Preferred Language</label>
          <div class="input-wrapper">
            <i class="fas fa-globe input-icon"></i>
            <select class="form-input form-select-input" [(ngModel)]="form.preferredLanguage" name="preferredLanguage">
              <option value="English">English</option>
              <option value="Hindi">Hindi</option>
              <option value="Spanish">Spanish</option>
              <option value="French">French</option>
              <option value="German">German</option>
            </select>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>
    <div class="auth-divider">
      <span>or</span>
    </div>
    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Sign in</a></p>
      <a routerLink="/" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
    </div>
  </div>
</div>
