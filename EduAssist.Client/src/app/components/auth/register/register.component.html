<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-user-plus"></i>
      <h2>Create Account</h2>
      <p>Join EduAssist and start learning smarter</p>
    </div>
    <form (ngSubmit)="register()">
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">First Name *</label><input type="text" class="form-control" [(ngModel)]="form.firstName" name="firstName" required></div>
        <div class="col-md-6 mb-3"><label class="form-label">Last Name *</label><input type="text" class="form-control" [(ngModel)]="form.lastName" name="lastName" required></div>
      </div>
      <div class="mb-3"><label class="form-label">Display Name *</label><input type="text" class="form-control" [(ngModel)]="form.displayName" name="displayName" required></div>
      <div class="mb-3"><label class="form-label">Email *</label><input type="email" class="form-control" [(ngModel)]="form.email" name="email" required></div>
      <div class="mb-3"><label class="form-label">Username *</label><input type="text" class="form-control" [(ngModel)]="form.userName" name="userName" required></div>
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Password *</label><input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="form.password" name="password" required></div>
        <div class="col-md-6 mb-3"><label class="form-label">Confirm Password *</label><input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="form.confirmPassword" name="confirmPassword" required></div>
      </div>
      <div class="form-check mb-3"><input type="checkbox" class="form-check-input" [(ngModel)]="showPassword" name="showPwd"><label class="form-check-label">Show password</label></div>
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Institution</label><input type="text" class="form-control" [(ngModel)]="form.institution" name="institution"></div>
        <div class="col-md-6 mb-3"><label class="form-label">Grade/Level</label><input type="text" class="form-control" [(ngModel)]="form.grade" name="grade"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Preferred Language</label>
        <select class="form-select" [(ngModel)]="form.preferredLanguage" name="preferredLanguage">
          <option value="English">English</option><option value="Hindi">Hindi</option><option value="Spanish">Spanish</option><option value="French">French</option><option value="German">German</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>{{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>
    <div class="auth-footer"><p>Already have an account? <a routerLink="/login">Sign in</a></p><a routerLink="/" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Home</a></div>
  </div>
</div>
