<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fas fa-lock"></i>
      </div>
      <h2>Reset Password</h2>
      <p>Enter your reset token and new password</p>
    </div>

    <div *ngIf="!success">
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-input" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Reset Token</label>
          <div class="input-wrapper">
            <i class="fas fa-key input-icon"></i>
            <input type="text" class="form-input" [(ngModel)]="token" name="token" placeholder="Paste your reset token" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input [type]="showPassword ? 'text' : 'password'" class="form-input" [(ngModel)]="newPassword" name="newPassword" placeholder="Enter new password" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input [type]="showPassword ? 'text' : 'password'" class="form-input" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
          </div>
        </div>
        <label class="show-password-toggle">
          <input type="checkbox" [(ngModel)]="showPassword" name="showPassword"> Show password
        </label>
        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
    </div>

    <div *ngIf="success" class="success-section">
      <div class="success-icon"><i class="fas fa-check-circle"></i></div>
      <p>Your password has been reset successfully!</p>
      <a routerLink="/login" class="btn-submit" style="display: block; text-align: center; text-decoration: none;">
        Go to Login
      </a>
    </div>

    <div class="auth-footer">
      <a routerLink="/login" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
    </div>
  </div>
</div>
