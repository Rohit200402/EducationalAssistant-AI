<!-- Mobile Hamburger Toggle -->
<button class="sidebar-mobile-toggle" (click)="toggleSidebar()" [class.active]="sidebarOpen">
  <i class="fas" [ngClass]="sidebarOpen ? 'fa-times' : 'fa-bars'"></i>
</button>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="toggleSidebar()"></div>

<!-- Sidebar Navigation -->
<aside class="sidebar" [class.open]="sidebarOpen">
  <!-- Brand Area -->
  <div class="sidebar-brand">
    <a routerLink="/admin/dashboard" class="brand-link">
      <div class="brand-icon">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <span class="brand-text">EduAssist</span>
      <span class="brand-badge">Admin</span>
    </a>
  </div>

  <!-- Search Area -->
  <div class="sidebar-search">
    <app-global-search></app-global-search>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <!-- Main Section -->
    <div class="nav-section">
      <span class="nav-section-title">Main</span>
      <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-tachometer-alt nav-icon"></i>
        <span class="nav-label">Dashboard</span>
      </a>
    </div>

    <!-- Management Section -->
    <div class="nav-section">
      <span class="nav-section-title">Management</span>
      <a class="nav-item" routerLink="/admin/users" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-users nav-icon"></i>
        <span class="nav-label">Users</span>
      </a>
      <a class="nav-item" routerLink="/admin/categories" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-tags nav-icon"></i>
        <span class="nav-label">Categories</span>
      </a>
    </div>

    <!-- Content Section -->
    <div class="nav-section">
      <span class="nav-section-title">Content</span>
      <a class="nav-item" routerLink="/admin/requests" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-question-circle nav-icon"></i>
        <span class="nav-label">Requests</span>
      </a>
      <a class="nav-item" routerLink="/admin/responses" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-robot nav-icon"></i>
        <span class="nav-label">Responses</span>
      </a>
      <a class="nav-item" routerLink="/admin/conversations" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-comments nav-icon"></i>
        <span class="nav-label">Conversations</span>
      </a>
    </div>

    <!-- Analytics Section -->
    <div class="nav-section">
      <span class="nav-section-title">Analytics</span>
      <a class="nav-item" routerLink="/admin/quiz-stats" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-brain nav-icon"></i>
        <span class="nav-label">Quiz Stats</span>
      </a>
    </div>
  </nav>

  <!-- Admin Profile Area (Bottom) -->
  <div class="sidebar-footer">
    <div class="user-profile">
      <div class="user-avatar">
        <i class="fas fa-user-shield"></i>
      </div>
      <div class="user-info">
        <span class="user-name">{{ authService.getCurrentUser()?.displayName }}</span>
        <span class="user-role">Administrator</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Logout">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</aside>
