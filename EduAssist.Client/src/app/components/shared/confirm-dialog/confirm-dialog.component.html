<div *ngIf="show" class="dialog-backdrop" (click)="cancel()"></div>
<div *ngIf="show" class="dialog-container" role="dialog" aria-labelledby="dialog-title" aria-modal="true">
  <div class="dialog-card">
    <div class="dialog-header">
      <div class="dialog-icon">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h3 id="dialog-title">{{ title }}</h3>
    </div>
    <div class="dialog-body">
      <p>{{ message }}</p>
    </div>
    <div class="dialog-actions">
      <button class="dialog-btn dialog-btn-cancel" (click)="cancel()">Cancel</button>
      <button class="dialog-btn dialog-btn-confirm" (click)="confirm()">Confirm</button>
    </div>
  </div>
</div>
