<div class="global-search-wrapper">
  <div class="search-input-container">
    <i class="fas fa-search search-icon"></i>
    <input
      #searchInput
      type="text"
      class="search-input"
      placeholder="Search..."
      [(ngModel)]="query"
      (input)="onSearch()"
      (blur)="hideDropdown()"
      (focus)="query && onSearch()">
    <span class="search-shortcut">
      <kbd>&#8984;K</kbd>
    </span>
  </div>

  <!-- Results Dropdown -->
  <div class="search-dropdown" *ngIf="showDropdown && results.length > 0">
    <div class="dropdown-header">
      <span class="dropdown-header-text">Results</span>
      <span class="dropdown-count">{{ results.length }}</span>
    </div>
    <div class="dropdown-results">
      <div class="result-item" *ngFor="let r of results" (mousedown)="navigateToResult(r)">
        <div class="result-icon" [ngClass]="{
          'result-icon--question': r.type === 'question',
          'result-icon--response': r.type === 'response',
          'result-icon--bookmark': r.type === 'bookmark'
        }">
          <i class="fas" [ngClass]="{
            'fa-question-circle': r.type === 'question',
            'fa-robot': r.type === 'response',
            'fa-bookmark': r.type === 'bookmark'
          }"></i>
        </div>
        <div class="result-content">
          <div class="result-title">{{ r.title }}</div>
          <div class="result-meta">
            <span class="result-type-badge">{{ r.type }}</span>
            <span class="result-category" *ngIf="r.categoryName">{{ r.categoryName }}</span>
          </div>
        </div>
      </div>
    </div>
    <div class="dropdown-footer" (mousedown)="viewAll()">
      <i class="fas fa-arrow-right"></i>
      <span>View all results</span>
    </div>
  </div>

  <!-- Loading State -->
  <div class="search-dropdown" *ngIf="showDropdown && loading">
    <div class="loading-state">
      <div class="loading-shimmer"></div>
      <div class="loading-shimmer loading-shimmer--short"></div>
      <div class="loading-shimmer"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="search-dropdown" *ngIf="showDropdown && results.length === 0 && !loading && query">
    <div class="empty-state">
      <i class="fas fa-search empty-state-icon"></i>
      <span class="empty-state-text">No results found for "{{ query }}"</span>
      <span class="empty-state-hint">Try different keywords or check your spelling</span>
    </div>
  </div>
</div>
