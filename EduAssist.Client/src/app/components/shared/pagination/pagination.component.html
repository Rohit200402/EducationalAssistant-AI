<nav *ngIf="totalPages > 1" class="pagination-wrapper">
  <span class="pagination-info">Showing page {{ currentPage }} of {{ totalPages }} ({{ totalCount }} records)</span>
  <div class="pagination-controls">
    <button class="page-btn page-btn-nav" [class.disabled]="currentPage === 1" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">
      <i class="fas fa-chevron-left"></i>
    </button>
    <button *ngFor="let page of pages" class="page-btn" [class.active]="page === currentPage" (click)="goToPage(page)">{{ page }}</button>
    <button class="page-btn page-btn-nav" [class.disabled]="currentPage === totalPages" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>
</nav>
