<nav *ngIf="totalPages > 1" class="d-flex justify-content-between align-items-center mt-3">
  <small class="text-muted">Showing page {{ currentPage }} of {{ totalPages }} ({{ totalCount }} records)</small>
  <ul class="pagination mb-0">
    <li class="page-item" [class.disabled]="currentPage === 1"><a class="page-link" (click)="goToPage(currentPage - 1)"><i class="fas fa-chevron-left"></i></a></li>
    <li *ngFor="let page of pages" class="page-item" [class.active]="page === currentPage"><a class="page-link" (click)="goToPage(page)">{{ page }}</a></li>
    <li class="page-item" [class.disabled]="currentPage === totalPages"><a class="page-link" (click)="goToPage(currentPage + 1)"><i class="fas fa-chevron-right"></i></a></li>
  </ul>
</nav>
