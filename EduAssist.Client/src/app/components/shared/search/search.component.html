<div class="search-wrapper">
  <div class="search-input-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" class="search-input" [placeholder]="placeholder" [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
    <button *ngIf="searchTerm" class="search-clear-btn" (click)="onClear()" type="button">
      <i class="fas fa-times"></i>
    </button>
  </div>
  <button class="search-btn" (click)="onSearch()" type="button">
    <i class="fas fa-search"></i>
    <span>Search</span>
  </button>
</div>
