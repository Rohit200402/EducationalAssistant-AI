<!-- Mobile Hamburger Toggle -->
<button class="sidebar-mobile-toggle" (click)="toggleSidebar()" [class.active]="sidebarOpen">
  <i class="fas" [ngClass]="sidebarOpen ? 'fa-times' : 'fa-bars'"></i>
</button>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="toggleSidebar()"></div>

<!-- Sidebar Navigation -->
<aside class="sidebar" [class.open]="sidebarOpen">
  <!-- Brand Area -->
  <div class="sidebar-brand">
    <a routerLink="/user/dashboard" class="brand-link">
      <div class="brand-icon">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <span class="brand-text">EduAssist</span>
    </a>
  </div>

  <!-- Search Area -->
  <div class="sidebar-search">
    <app-global-search></app-global-search>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <!-- Main Section -->
    <div class="nav-section">
      <span class="nav-section-title">Main</span>
      <a class="nav-item" routerLink="/user/dashboard" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-home nav-icon"></i>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/user/ask" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-plus-circle nav-icon"></i>
        <span class="nav-label">Ask Question</span>
      </a>
    </div>

    <!-- Content Section -->
    <div class="nav-section">
      <span class="nav-section-title">Content</span>
      <a class="nav-item" routerLink="/user/conversations" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-comments nav-icon"></i>
        <span class="nav-label">Conversations</span>
      </a>
      <a class="nav-item" routerLink="/user/my-requests" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-list nav-icon"></i>
        <span class="nav-label">My Requests</span>
      </a>
      <a class="nav-item" routerLink="/user/my-responses" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-robot nav-icon"></i>
        <span class="nav-label">Responses</span>
      </a>
      <a class="nav-item" routerLink="/user/bookmarks" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-bookmark nav-icon"></i>
        <span class="nav-label">Bookmarks</span>
      </a>
    </div>

    <!-- Learning Section -->
    <div class="nav-section">
      <span class="nav-section-title">Learning</span>
      <a class="nav-item" routerLink="/user/quiz" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-brain nav-icon"></i>
        <span class="nav-label">Quiz</span>
      </a>
      <a class="nav-item" routerLink="/user/progress" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-chart-line nav-icon"></i>
        <span class="nav-label">Progress</span>
      </a>
    </div>

    <!-- Tools Section -->
    <div class="nav-section">
      <span class="nav-section-title">Tools</span>
      <a class="nav-item" routerLink="/user/export" routerLinkActive="active" (click)="closeSidebarOnMobile()">
        <i class="fas fa-download nav-icon"></i>
        <span class="nav-label">Export</span>
      </a>
    </div>
  </nav>

  <!-- User Profile Area (Bottom) -->
  <div class="sidebar-footer">
    <a class="user-profile" routerLink="/user/profile" routerLinkActive="active" (click)="closeSidebarOnMobile()">
      <div class="user-avatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="user-info">
        <span class="user-name">{{ authService.getCurrentUser()?.displayName }}</span>
        <span class="user-role">Student</span>
      </div>
    </a>
    <button class="logout-btn" (click)="logout()" title="Logout">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</aside>
