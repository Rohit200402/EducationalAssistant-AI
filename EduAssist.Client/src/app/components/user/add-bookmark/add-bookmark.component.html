<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>Add Bookmark</h2>
    <p>Save this response for later reference</p>
  </div>

  <div class="form-card animate-fade-in">
    <div class="form-card-icon"><i class="fas fa-bookmark"></i></div>
    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Notes <span class="optional">(optional)</span></label>
        <textarea class="form-control" [(ngModel)]="notes" name="notes" rows="4" placeholder="Add personal notes about this response..."></textarea>
        <span class="form-hint">Notes help you remember why you saved this response</span>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="loading"><i class="fas fa-bookmark me-1"></i>Save Bookmark</button>
        <a routerLink="/user/bookmarks" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<app-footer></app-footer>
