<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-plus-circle me-2"></i>Ask a Question</h2><p>Get AI-powered answers to your educational questions</p></div>
  <div class="card">
    <div class="card-body">
      <form (ngSubmit)="submit()" *ngIf="!response">
        <div class="mb-3">
          <label class="form-label">Category *</label>
          <select class="form-select" [(ngModel)]="categoryId" name="categoryId" required>
            <option [value]="0" disabled>Select a subject category</option>
            <option *ngFor="let c of categories" [value]="c.categoryId">{{ c.subjectName }}</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Your Question *</label>
          <textarea class="form-control" [(ngModel)]="query" name="query" rows="4" placeholder="Type your educational question here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!loading" class="fas fa-paper-plane me-1"></i>{{ loading ? 'Generating...' : 'Ask Question' }}
        </button>
      </form>

      <div *ngIf="error503 && !response" class="alert alert-warning mt-3">
        <i class="fas fa-exclamation-triangle me-2"></i>AI service is temporarily unavailable. Your question has been saved.
        <button class="btn btn-sm btn-warning ms-3" (click)="retry()" [disabled]="loading">
          <i class="fas fa-redo me-1"></i>Retry
        </button>
      </div>

      <div *ngIf="response" class="mt-3">
        <div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>Response generated successfully!</div>
        <div class="card bg-light"><div class="card-body">
          <h5><i class="fas fa-robot me-2"></i>AI Response</h5>
          <div class="markdown-content" [innerHTML]="response.aiResponse?.response"></div>
        </div></div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-outline-primary" (click)="bookmark()"><i class="fas fa-bookmark me-1"></i>Bookmark</button>
          <button class="btn btn-primary" (click)="reset()"><i class="fas fa-plus me-1"></i>Ask Another</button>
          <a routerLink="/user/my-requests" class="btn btn-secondary"><i class="fas fa-list me-1"></i>View All</a>
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
