<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>Ask a Question</h2>
    <p>Get AI-powered answers to your educational questions</p>
  </div>

  <div class="animate-fade-in">
    <div class="form-card" *ngIf="!response">
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Category <span class="required">*</span></label>
          <select class="form-select" [(ngModel)]="categoryId" name="categoryId" required>
            <option [value]="0" disabled>Select a subject category</option>
            <option *ngFor="let c of categories" [value]="c.categoryId">{{ c.subjectName }}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Your Question <span class="required">*</span></label>
          <textarea class="form-control textarea-large" [(ngModel)]="query" name="query" rows="5" placeholder="Type your educational question here..." required></textarea>
        </div>
        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!loading" class="fas fa-paper-plane me-1"></i>{{ loading ? 'Generating...' : 'Ask Question' }}
        </button>
      </form>
    </div>

    <div *ngIf="error503 && !response" class="error-card">
      <div class="error-content">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <div>
          <strong>AI service is temporarily unavailable</strong>
          <p>Your question has been saved. You can retry when the service is back.</p>
        </div>
      </div>
      <button class="btn-retry" (click)="retry()" [disabled]="loading">
        <i class="fas fa-redo me-1"></i>Retry
      </button>
    </div>

    <div *ngIf="response" class="response-section">
      <div class="success-banner">
        <i class="fas fa-check-circle me-2"></i>Response generated successfully!
      </div>

      <div class="response-card">
        <div class="response-header">
          <div class="ai-avatar"><i class="fas fa-robot"></i></div>
          <div>
            <h5>AI Response</h5>
            <span class="response-meta">Generated just now</span>
          </div>
          <app-copy-button [text]="response.aiResponse?.response || ''" class="ms-auto"></app-copy-button>
        </div>
        <div class="response-body">
          <div class="markdown-content" [innerHTML]="response.aiResponse?.response"></div>
        </div>
        <div class="response-rating">
          <app-star-rating [rating]="userRating" (ratingChange)="rateResponse($event)"></app-star-rating>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn-action btn-action-outline" (click)="bookmark()"><i class="fas fa-bookmark me-1"></i>Bookmark</button>
        <button class="btn-action btn-action-primary" (click)="reset()"><i class="fas fa-plus me-1"></i>Ask Another</button>
        <a routerLink="/user/my-requests" class="btn-action btn-action-ghost"><i class="fas fa-list me-1"></i>View All</a>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
