<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>My Bookmarks</h2>
    <p>Your saved responses for quick reference</p>
  </div>

  <div class="search-section">
    <app-search placeholder="Search bookmarks..." (searchChange)="onSearch($event)"></app-search>
  </div>

  <!-- Skeleton Loading -->
  <div *ngIf="loading" class="animate-fade-in">
    <div class="bookmark-card" *ngFor="let s of [1,2,3]">
      <div class="bookmark-card-body">
        <div class="skeleton skeleton-text" style="width: 30%; height: 12px; margin-bottom: 12px;"></div>
        <div class="skeleton skeleton-text" style="width: 80%; height: 16px; margin-bottom: 8px;"></div>
        <div class="skeleton skeleton-text" style="width: 100%; height: 14px;"></div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading" class="animate-fade-in">
    <!-- Empty State -->
    <div *ngIf="bookmarks.length === 0" class="empty-state">
      <div class="empty-state-icon"><i class="fas fa-bookmark"></i></div>
      <h4>No bookmarks yet</h4>
      <p>Bookmark AI responses to find them quickly later</p>
    </div>

    <!-- Bookmark Cards -->
    <div *ngFor="let b of bookmarks" class="bookmark-card">
      <div class="bookmark-card-body">
        <div class="bookmark-top">
          <div class="bookmark-meta">
            <span class="bookmark-category">{{ b.aiResponse?.categoryName }}</span>
            <span class="bookmark-date">{{ b.bookmarkedOn | date:'short' }}</span>
          </div>
          <div class="bookmark-actions">
            <a [routerLink]="['/user/bookmarks/edit', b.bookmarkId]" class="btn-action-icon btn-edit"><i class="fas fa-edit"></i></a>
            <button class="btn-action-icon btn-delete" (click)="delete(b.bookmarkId)"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <p class="bookmark-question"><strong>Q:</strong> {{ b.aiResponse?.query }}</p>
        <p class="bookmark-preview">{{ b.aiResponse?.response | slice:0:150 }}...</p>
        <div *ngIf="b.notes" class="bookmark-notes">
          <i class="fas fa-sticky-note me-1"></i>{{ b.notes }}
        </div>
      </div>
    </div>

    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" [totalCount]="totalCount" (pageChange)="onPageChange($event)"></app-pagination>
  </div>
</div>
<app-footer></app-footer>
