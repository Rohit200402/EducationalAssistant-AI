<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <div class="page-header-content">
      <h2>My Conversations</h2>
      <p>Continue your learning chats with AI</p>
    </div>
    <button class="btn-primary-action" (click)="newConversation()"><i class="fas fa-plus me-1"></i>New Conversation</button>
  </div>

  <!-- Skeleton Loading -->
  <div *ngIf="loading" class="animate-fade-in">
    <div class="conversation-card" *ngFor="let s of [1,2,3]">
      <div class="conv-card-body">
        <div class="conv-info">
          <div class="skeleton skeleton-text" style="width: 60%; height: 18px; margin-bottom: 8px;"></div>
          <div class="skeleton skeleton-text" style="width: 40%; height: 14px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && conversations.length === 0" class="empty-state animate-fade-in">
    <div class="empty-state-icon"><i class="fas fa-comments"></i></div>
    <h4>No conversations yet</h4>
    <p>Start a new chat to get AI-powered help with your studies</p>
    <button class="btn-primary-action" (click)="newConversation()"><i class="fas fa-plus me-1"></i>Start Conversation</button>
  </div>

  <!-- Conversation List -->
  <div *ngIf="!loading && conversations.length > 0" class="animate-fade-in">
    <div *ngFor="let c of conversations" class="conversation-card" (click)="openChat(c.conversationId)">
      <div class="conv-card-body">
        <div class="conv-icon"><i class="fas fa-comment-dots"></i></div>
        <div class="conv-info">
          <h6 class="conv-title">{{ c.title }}</h6>
          <div class="conv-meta">
            <span class="conv-badge">{{ c.categoryName }}</span>
            <span class="conv-date">{{ c.updatedAt | date:'medium' }}</span>
          </div>
        </div>
        <div class="conv-actions">
          <span class="message-count"><i class="fas fa-comment-alt me-1"></i>{{ c.messageCount }}</span>
          <button class="btn-delete" (click)="deleteConversation($event, c.conversationId)" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    </div>

    <nav *ngIf="totalPages > 1" class="pagination-nav">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="pageNumber === 1"><a class="page-link" (click)="changePage(pageNumber - 1)">Previous</a></li>
        <li class="page-item" *ngFor="let p of [].constructor(totalPages); let i = index" [class.active]="pageNumber === i + 1"><a class="page-link" (click)="changePage(i + 1)">{{ i + 1 }}</a></li>
        <li class="page-item" [class.disabled]="pageNumber === totalPages"><a class="page-link" (click)="changePage(pageNumber + 1)">Next</a></li>
      </ul>
    </nav>
  </div>
</div>
<app-footer></app-footer>
