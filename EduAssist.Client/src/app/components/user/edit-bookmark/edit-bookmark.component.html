<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>Edit Bookmark</h2>
    <p>Update your bookmark notes</p>
  </div>

  <div class="form-card animate-fade-in">
    <div class="form-card-icon"><i class="fas fa-edit"></i></div>
    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-control" [(ngModel)]="notes" name="notes" rows="4"></textarea>
        <span class="form-hint">Update the notes for this bookmarked response</span>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="loading"><i class="fas fa-save me-1"></i>Update</button>
        <a routerLink="/user/bookmarks" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<app-footer></app-footer>
