<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-edit me-2"></i>Edit Bookmark</h2></div>
  <div class="card"><div class="card-body">
    <form (ngSubmit)="submit()">
      <div class="mb-3"><label class="form-label">Notes</label><textarea class="form-control" [(ngModel)]="notes" name="notes" rows="4"></textarea></div>
      <div class="d-flex gap-2"><button type="submit" class="btn btn-primary" [disabled]="loading"><i class="fas fa-save me-1"></i>Update</button><a routerLink="/user/bookmarks" class="btn btn-secondary">Cancel</a></div>
    </form>
  </div></div>
</div>
<app-footer></app-footer>
