<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>Edit Profile</h2>
    <p>Manage your account settings</p>
  </div>

  <div *ngIf="user" class="animate-fade-in">
    <!-- Profile Form Card -->
    <div class="profile-card">
      <div class="profile-card-header">
        <div class="profile-avatar">
          <i class="fas fa-user"></i>
        </div>
        <div>
          <h5>Personal Information</h5>
          <p>Update your profile details</p>
        </div>
      </div>
      <div class="profile-card-body">
        <form (ngSubmit)="submit()">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input class="form-control" [(ngModel)]="form.firstName" name="firstName" required>
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input class="form-control" [(ngModel)]="form.lastName" name="lastName" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Display Name</label>
            <input class="form-control" [(ngModel)]="form.displayName" name="displayName" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Institution</label>
              <input class="form-control" [(ngModel)]="form.institution" name="institution" placeholder="Your school or university">
            </div>
            <div class="form-group">
              <label class="form-label">Grade</label>
              <input class="form-control" [(ngModel)]="form.grade" name="grade" placeholder="e.g., 10th Grade">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Bio</label>
            <textarea class="form-control form-textarea" [(ngModel)]="form.bio" name="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Preferred Language</label>
            <select class="form-select" [(ngModel)]="form.preferredLanguage" name="preferredLanguage">
              <option value="English">English</option>
              <option value="Hindi">Hindi</option>
              <option value="Spanish">Spanish</option>
              <option value="French">French</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" [disabled]="loading"><i class="fas fa-save me-1"></i>Save Changes</button>
            <a routerLink="/user/dashboard" class="btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>

    <!-- Account Info Card -->
    <div class="info-card">
      <div class="info-card-header">
        <h5><i class="fas fa-info-circle me-2"></i>Account Information</h5>
      </div>
      <div class="info-card-body">
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value">{{ user.email }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Username</span>
          <span class="info-value">{{ user.userName }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Joined</span>
          <span class="info-value">{{ user.joinedOn | date:'mediumDate' }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Total Questions</span>
          <span class="info-value">{{ user.totalQueriesAsked }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
