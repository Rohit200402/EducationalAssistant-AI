<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-user-edit me-2"></i>Edit Profile</h2></div>
  <div *ngIf="user" class="card"><div class="card-body">
    <form (ngSubmit)="submit()">
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">First Name</label><input class="form-control" [(ngModel)]="form.firstName" name="firstName" required></div>
        <div class="col-md-6 mb-3"><label class="form-label">Last Name</label><input class="form-control" [(ngModel)]="form.lastName" name="lastName" required></div>
      </div>
      <div class="mb-3"><label class="form-label">Display Name</label><input class="form-control" [(ngModel)]="form.displayName" name="displayName" required></div>
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Institution</label><input class="form-control" [(ngModel)]="form.institution" name="institution"></div>
        <div class="col-md-6 mb-3"><label class="form-label">Grade</label><input class="form-control" [(ngModel)]="form.grade" name="grade"></div>
      </div>
      <div class="mb-3"><label class="form-label">Bio</label><textarea class="form-control" [(ngModel)]="form.bio" name="bio" rows="3"></textarea></div>
      <div class="mb-3"><label class="form-label">Preferred Language</label><select class="form-select" [(ngModel)]="form.preferredLanguage" name="preferredLanguage"><option value="English">English</option><option value="Hindi">Hindi</option><option value="Spanish">Spanish</option><option value="French">French</option></select></div>
      <div class="d-flex gap-2"><button type="submit" class="btn btn-primary" [disabled]="loading"><i class="fas fa-save me-1"></i>Save Changes</button><a routerLink="/user/dashboard" class="btn btn-secondary">Cancel</a></div>
    </form>
  </div></div>
  <div *ngIf="user" class="card mt-3"><div class="card-body">
    <h5><i class="fas fa-info-circle me-2"></i>Account Info</h5>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Username:</strong> {{ user.userName }}</p>
    <p><strong>Joined:</strong> {{ user.joinedOn | date:'mediumDate' }}</p>
    <p><strong>Total Questions:</strong> {{ user.totalQueriesAsked }}</p>
  </div></div>
</div>
<app-footer></app-footer>
