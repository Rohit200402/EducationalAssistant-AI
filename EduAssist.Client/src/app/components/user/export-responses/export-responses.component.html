<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header d-flex justify-content-between align-items-center">
    <h2><i class="fas fa-file-export me-2"></i>Export Responses</h2>
    <button class="btn btn-primary" (click)="exportSelected()" [disabled]="selectedIds.size === 0"><i class="fas fa-download me-1"></i>Export Selected ({{ selectedIds.size }})</button>
  </div>

  <div *ngIf="loading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading && responses.length === 0" class="text-center py-5">
    <i class="fas fa-file-export fa-3x text-muted mb-3"></i>
    <p class="text-muted">No responses to export.</p>
  </div>

  <div *ngIf="!loading && responses.length > 0">
    <div class="mb-3">
      <button class="btn btn-sm btn-outline-secondary" (click)="selectAll()"><i class="fas fa-check-double me-1"></i>{{ selectedIds.size === responses.length ? 'Deselect All' : 'Select All' }}</button>
    </div>
    <div *ngFor="let r of responses" class="card mb-2 response-card" [class.selected]="isSelected(r.aiResponseId)" (click)="toggleSelection(r.aiResponseId)">
      <div class="card-body d-flex align-items-center">
        <div class="form-check me-3">
          <input class="form-check-input" type="checkbox" [checked]="isSelected(r.aiResponseId)" (click)="$event.stopPropagation()">
        </div>
        <div class="flex-grow-1">
          <h6 class="mb-1">{{ r.query }}</h6>
          <small class="text-muted">{{ r.categoryName }} | {{ r.createdAt | date:'medium' }}</small>
        </div>
      </div>
    </div>

    <nav *ngIf="totalPages > 1" class="mt-3">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="pageNumber === 1"><a class="page-link" (click)="changePage(pageNumber - 1)">Previous</a></li>
        <li class="page-item" *ngFor="let p of [].constructor(totalPages); let i = index" [class.active]="pageNumber === i + 1"><a class="page-link" (click)="changePage(i + 1)">{{ i + 1 }}</a></li>
        <li class="page-item" [class.disabled]="pageNumber === totalPages"><a class="page-link" (click)="changePage(pageNumber + 1)">Next</a></li>
      </ul>
    </nav>
  </div>
</div>
<app-footer></app-footer>
