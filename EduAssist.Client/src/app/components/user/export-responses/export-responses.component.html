<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <div class="page-header-content">
      <h2>Export Responses</h2>
      <p>Select responses to export as a document</p>
    </div>
    <button class="btn-export" (click)="exportSelected()" [disabled]="selectedIds.size === 0">
      <i class="fas fa-download me-1"></i>Export Selected ({{ selectedIds.size }})
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="animate-fade-in">
    <div class="export-card" *ngFor="let s of [1,2,3,4]">
      <div class="export-card-body">
        <div class="skeleton skeleton-text" style="width: 70%; height: 16px; margin-bottom: 8px;"></div>
        <div class="skeleton skeleton-text" style="width: 40%; height: 12px;"></div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && responses.length === 0" class="empty-state animate-fade-in">
    <div class="empty-state-icon"><i class="fas fa-file-export"></i></div>
    <h4>No responses to export</h4>
    <p>Once you have AI responses, you can export them here.</p>
  </div>

  <!-- Response List -->
  <div *ngIf="!loading && responses.length > 0" class="animate-fade-in">
    <div class="select-actions">
      <button class="btn-select-all" (click)="selectAll()">
        <i class="fas fa-check-double me-1"></i>{{ selectedIds.size === responses.length ? 'Deselect All' : 'Select All' }}
      </button>
      <span class="select-count" *ngIf="selectedIds.size > 0">{{ selectedIds.size }} selected</span>
    </div>

    <div *ngFor="let r of responses" class="export-card" [class.selected]="isSelected(r.aiResponseId)" (click)="toggleSelection(r.aiResponseId)">
      <div class="export-card-body">
        <div class="export-checkbox">
          <input class="form-check-input" type="checkbox" [checked]="isSelected(r.aiResponseId)" (click)="$event.stopPropagation()">
        </div>
        <div class="export-content">
          <h6 class="export-query">{{ r.query }}</h6>
          <div class="export-meta">
            <span class="export-category">{{ r.categoryName }}</span>
            <span class="export-date">{{ r.createdAt | date:'medium' }}</span>
          </div>
        </div>
      </div>
    </div>

    <nav *ngIf="totalPages > 1" class="pagination-nav">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="pageNumber === 1"><a class="page-link" (click)="changePage(pageNumber - 1)">Previous</a></li>
        <li class="page-item" *ngFor="let p of [].constructor(totalPages); let i = index" [class.active]="pageNumber === i + 1"><a class="page-link" (click)="changePage(i + 1)">{{ i + 1 }}</a></li>
        <li class="page-item" [class.disabled]="pageNumber === totalPages"><a class="page-link" (click)="changePage(pageNumber + 1)">Next</a></li>
      </ul>
    </nav>
  </div>
</div>
<app-footer></app-footer>
