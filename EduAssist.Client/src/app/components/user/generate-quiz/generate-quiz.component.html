<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-magic me-2"></i>Generate Quiz</h2></div>
  <div class="card">
    <div class="card-body">
      <form (ngSubmit)="generate()">
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select" [(ngModel)]="selectedCategoryId" name="categoryId" required>
            <option [value]="0" disabled>Select a category</option>
            <option *ngFor="let c of categories" [value]="c.categoryId">{{ c.subjectName }}</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Topic</label>
          <input type="text" class="form-control" [(ngModel)]="topic" name="topic" required placeholder="e.g., Photosynthesis, Newton's Laws, SQL Joins">
        </div>
        <div class="mb-3">
          <label class="form-label">Number of Questions</label>
          <select class="form-select" [(ngModel)]="numberOfQuestions" name="numberOfQuestions">
            <option [value]="3">3 Questions</option>
            <option [value]="5">5 Questions</option>
            <option [value]="10">10 Questions</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="generating">
            <span *ngIf="generating" class="spinner-border spinner-border-sm me-1"></span>
            <i *ngIf="!generating" class="fas fa-magic me-1"></i>{{ generating ? 'Generating...' : 'Generate Quiz' }}
          </button>
          <a routerLink="/user/quiz" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<app-footer></app-footer>
