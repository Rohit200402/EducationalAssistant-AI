<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>My Requests</h2>
    <p>Track all your submitted questions</p>
  </div>

  <div class="search-section">
    <app-search placeholder="Search your requests..." (searchChange)="onSearch($event)"></app-search>
  </div>

  <!-- Skeleton Loading -->
  <div *ngIf="loading" class="animate-fade-in">
    <div class="request-card" *ngFor="let s of [1,2,3,4]">
      <div class="request-card-body">
        <div class="skeleton skeleton-text" style="width: 70%; height: 16px; margin-bottom: 8px;"></div>
        <div class="skeleton skeleton-text" style="width: 40%; height: 12px;"></div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading" class="animate-fade-in">
    <!-- Empty State -->
    <div *ngIf="requests.length === 0" class="empty-state">
      <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
      <h4>No requests yet</h4>
      <p>Submit your first question and it will appear here</p>
      <a routerLink="/user/ask" class="btn-primary-action"><i class="fas fa-plus me-1"></i>Ask a Question</a>
    </div>

    <!-- Request Cards -->
    <div *ngFor="let r of requests" class="request-card">
      <div class="request-card-body">
        <div class="request-top">
          <h6 class="request-query">{{ r.query | slice:0:80 }}</h6>
          <span [class]="r.aiResponse ? 'badge-status badge-status-success' : 'badge-status badge-status-warning'">{{ r.aiResponse ? 'Answered' : 'Pending' }}</span>
        </div>
        <div class="request-meta">
          <span class="request-category">{{ r.categoryName }}</span>
          <span class="request-date">{{ r.requestedOn | date:'medium' }}</span>
        </div>
        <div class="request-actions" *ngIf="r.aiResponse">
          <a [routerLink]="['/user/responses', r.userRequestId]" class="btn-view"><i class="fas fa-eye me-1"></i>View Response</a>
        </div>
      </div>
    </div>

    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" [totalCount]="totalCount" (pageChange)="onPageChange($event)"></app-pagination>
  </div>
</div>
<app-footer></app-footer>
