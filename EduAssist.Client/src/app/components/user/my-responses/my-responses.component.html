<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>My Responses</h2>
    <p>Browse all AI-generated answers to your questions</p>
  </div>

  <div class="search-section">
    <app-search placeholder="Search responses..." (searchChange)="onSearch($event)"></app-search>
  </div>

  <!-- Skeleton Loading -->
  <div *ngIf="loading" class="animate-fade-in">
    <div class="response-card" *ngFor="let s of [1,2,3]">
      <div class="response-card-body">
        <div class="skeleton skeleton-text" style="width: 30%; height: 12px; margin-bottom: 12px;"></div>
        <div class="skeleton skeleton-text" style="width: 80%; height: 16px; margin-bottom: 8px;"></div>
        <div class="skeleton skeleton-text" style="width: 100%; height: 14px;"></div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading" class="animate-fade-in">
    <!-- Empty State -->
    <div *ngIf="responses.length === 0" class="empty-state">
      <div class="empty-state-icon"><i class="fas fa-robot"></i></div>
      <h4>No responses yet</h4>
      <p>AI responses to your questions will appear here</p>
    </div>

    <!-- Response Cards -->
    <div *ngFor="let r of responses" class="response-card">
      <div class="response-card-body">
        <div class="response-top">
          <div class="response-meta">
            <span class="response-category">{{ r.categoryName }}</span>
            <span class="response-date">{{ r.createdAt | date:'short' }}</span>
          </div>
          <a [routerLink]="['/user/responses', r.userRequestId]" class="btn-view"><i class="fas fa-eye"></i></a>
        </div>
        <p class="response-question"><strong>Q:</strong> {{ r.query }}</p>
        <p class="response-preview">{{ r.response | slice:0:150 }}...</p>
      </div>
    </div>

    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" [totalCount]="totalCount" (pageChange)="onPageChange($event)"></app-pagination>
  </div>
</div>
<app-footer></app-footer>
