<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header d-flex justify-content-between align-items-center">
    <h2><i class="fas fa-brain me-2"></i>My Quizzes</h2>
    <button class="btn btn-primary" (click)="generateNew()"><i class="fas fa-plus me-1"></i>Generate New Quiz</button>
  </div>

  <div *ngIf="loading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading && quizzes.length === 0" class="text-center py-5">
    <i class="fas fa-brain fa-3x text-muted mb-3"></i>
    <p class="text-muted">No quizzes yet. Generate your first quiz!</p>
    <button class="btn btn-primary" (click)="generateNew()"><i class="fas fa-plus me-1"></i>Generate Quiz</button>
  </div>

  <div *ngIf="!loading && quizzes.length > 0">
    <div *ngFor="let q of quizzes" class="card mb-3 quiz-card">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h6 class="mb-1"><i class="fas fa-clipboard-list me-2 text-primary"></i>{{ q.title }}</h6>
          <small class="text-muted">
            <span class="badge bg-primary me-2">{{ q.categoryName }}</span>
            <span class="badge me-2" [ngClass]="{'bg-success': q.difficulty === 'Easy', 'bg-warning': q.difficulty === 'Medium', 'bg-danger': q.difficulty === 'Hard'}">{{ q.difficulty }}</span>
            {{ q.totalQuestions }} questions | {{ q.createdAt | date:'mediumDate' }}
          </small>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-primary" (click)="openQuiz(q.quizId)"><i class="fas fa-play me-1"></i>Take</button>
          <button class="btn btn-sm btn-outline-success" (click)="viewResults(q.quizId)"><i class="fas fa-chart-bar me-1"></i>Results</button>
        </div>
      </div>
    </div>

    <nav *ngIf="totalPages > 1">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="pageNumber === 1"><a class="page-link" (click)="changePage(pageNumber - 1)">Previous</a></li>
        <li class="page-item" *ngFor="let p of [].constructor(totalPages); let i = index" [class.active]="pageNumber === i + 1"><a class="page-link" (click)="changePage(i + 1)">{{ i + 1 }}</a></li>
        <li class="page-item" [class.disabled]="pageNumber === totalPages"><a class="page-link" (click)="changePage(pageNumber + 1)">Next</a></li>
      </ul>
    </nav>
  </div>
</div>
<app-footer></app-footer>
