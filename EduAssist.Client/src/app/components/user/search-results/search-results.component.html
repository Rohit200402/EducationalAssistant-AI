<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-search me-2"></i>Search Results</h2></div>

  <div class="card mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-5">
          <input type="text" class="form-control" placeholder="Search..." [(ngModel)]="query" (keyup.enter)="search()">
        </div>
        <div class="col-md-3">
          <select class="form-select" [(ngModel)]="type" (change)="search()">
            <option value="">All Types</option>
            <option value="question">Questions</option>
            <option value="response">Responses</option>
            <option value="bookmark">Bookmarks</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select" [(ngModel)]="categoryId" (change)="search()">
            <option [ngValue]="null">All Categories</option>
            <option *ngFor="let c of categories" [ngValue]="c.categoryId">{{ c.subjectName }}</option>
          </select>
        </div>
        <div class="col-md-1">
          <button class="btn btn-primary w-100" (click)="search()"><i class="fas fa-search"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading && results.length === 0 && query" class="text-center py-4">
    <i class="fas fa-search fa-3x text-muted mb-3"></i>
    <p class="text-muted">No results found for "{{ query }}"</p>
  </div>

  <div *ngIf="!loading && results.length > 0">
    <p class="text-muted mb-3">Found {{ totalCount }} result(s)</p>
    <div *ngFor="let r of results" class="card mb-3 result-card" (click)="navigate(r)">
      <div class="card-body">
        <div class="d-flex align-items-start">
          <i class="fas me-3 mt-1" [ngClass]="getIcon(r.type)"></i>
          <div class="flex-grow-1">
            <h6 class="mb-1">{{ r.title }}</h6>
            <p class="text-muted small mb-1">{{ r.snippet }}</p>
            <small class="text-muted"><span class="badge bg-light text-dark me-2">{{ r.type }}</span><span class="badge bg-primary me-2">{{ r.categoryName }}</span>{{ r.date | date:'mediumDate' }}</small>
          </div>
        </div>
      </div>
    </div>

    <nav *ngIf="totalPages > 1">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="pageNumber === 1"><a class="page-link" (click)="changePage(pageNumber - 1)">Previous</a></li>
        <li class="page-item" *ngFor="let p of [].constructor(totalPages); let i = index" [class.active]="pageNumber === i + 1"><a class="page-link" (click)="changePage(i + 1)">{{ i + 1 }}</a></li>
        <li class="page-item" [class.disabled]="pageNumber === totalPages"><a class="page-link" (click)="changePage(pageNumber + 1)">Next</a></li>
      </ul>
    </nav>
  </div>
</div>
<app-footer></app-footer>
