<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div *ngIf="loading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading && quiz">
    <div class="page-header d-flex justify-content-between align-items-center">
      <h2><i class="fas fa-brain me-2"></i>{{ quiz.title }}</h2>
      <span class="badge bg-primary fs-6">Question {{ currentIndex + 1 }} / {{ quiz.questions.length }}</span>
    </div>

    <div class="progress-bar-wrapper"><div class="progress-bar-inner" [style.width.%]="progress"></div></div>

    <div *ngIf="currentQuestion" class="card question-card">
      <div class="card-body">
        <h5 class="mb-4">{{ currentQuestion.questionText }}</h5>
        <button class="btn btn-outline-primary option-btn" [class.selected]="getSelected() === 'A'" (click)="selectOption('A')"><strong>A.</strong> {{ currentQuestion.optionA }}</button>
        <button class="btn btn-outline-primary option-btn" [class.selected]="getSelected() === 'B'" (click)="selectOption('B')"><strong>B.</strong> {{ currentQuestion.optionB }}</button>
        <button class="btn btn-outline-primary option-btn" [class.selected]="getSelected() === 'C'" (click)="selectOption('C')"><strong>C.</strong> {{ currentQuestion.optionC }}</button>
        <button class="btn btn-outline-primary option-btn" [class.selected]="getSelected() === 'D'" (click)="selectOption('D')"><strong>D.</strong> {{ currentQuestion.optionD }}</button>
      </div>
    </div>

    <div class="d-flex justify-content-between mt-4">
      <button class="btn btn-secondary" (click)="prev()" [disabled]="currentIndex === 0"><i class="fas fa-arrow-left me-1"></i>Previous</button>
      <button *ngIf="currentIndex < quiz.questions.length - 1" class="btn btn-primary" (click)="next()">Next<i class="fas fa-arrow-right ms-1"></i></button>
      <button *ngIf="currentIndex === quiz.questions.length - 1" class="btn btn-success" (click)="submit()" [disabled]="submitting">
        <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
        <i *ngIf="!submitting" class="fas fa-check me-1"></i>Submit Quiz
      </button>
    </div>
  </div>
</div>
<app-footer></app-footer>
