<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <!-- Loading Skeleton -->
  <div *ngIf="loading" class="animate-fade-in">
    <div class="skeleton skeleton-text" style="width: 50%; height: 24px; margin-bottom: 16px;"></div>
    <div class="skeleton skeleton-text" style="width: 100%; height: 8px; margin-bottom: 24px;"></div>
    <div class="quiz-question-card">
      <div class="skeleton skeleton-text" style="width: 80%; height: 20px; margin-bottom: 24px;"></div>
      <div class="skeleton skeleton-text" style="width: 100%; height: 50px; margin-bottom: 12px;" *ngFor="let s of [1,2,3,4]"></div>
    </div>
  </div>

  <div *ngIf="!loading && quiz" class="animate-fade-in">
    <!-- Quiz Header -->
    <div class="quiz-header">
      <div class="quiz-header-info">
        <h2 class="quiz-title"><i class="fas fa-brain me-2"></i>{{ quiz.title }}</h2>
      </div>
      <span class="question-counter">Question {{ currentIndex + 1 }} / {{ quiz.questions.length }}</span>
    </div>

    <!-- Progress Bar -->
    <div class="quiz-progress">
      <div class="quiz-progress-fill" [style.width.%]="progress"></div>
    </div>

    <!-- Question Card -->
    <div *ngIf="currentQuestion" class="quiz-question-card">
      <div class="question-number">Question {{ currentIndex + 1 }}</div>
      <h4 class="question-text">{{ currentQuestion.questionText }}</h4>

      <div class="options-grid">
        <button class="option-card" [class.selected]="getSelected() === 'A'" (click)="selectOption('A')">
          <span class="option-letter">A</span>
          <span class="option-text">{{ currentQuestion.optionA }}</span>
        </button>
        <button class="option-card" [class.selected]="getSelected() === 'B'" (click)="selectOption('B')">
          <span class="option-letter">B</span>
          <span class="option-text">{{ currentQuestion.optionB }}</span>
        </button>
        <button class="option-card" [class.selected]="getSelected() === 'C'" (click)="selectOption('C')">
          <span class="option-letter">C</span>
          <span class="option-text">{{ currentQuestion.optionC }}</span>
        </button>
        <button class="option-card" [class.selected]="getSelected() === 'D'" (click)="selectOption('D')">
          <span class="option-letter">D</span>
          <span class="option-text">{{ currentQuestion.optionD }}</span>
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <div class="quiz-nav">
      <button class="btn-nav btn-prev" (click)="prev()" [disabled]="currentIndex === 0">
        <i class="fas fa-arrow-left me-1"></i>Previous
      </button>
      <button *ngIf="currentIndex < quiz.questions.length - 1" class="btn-nav btn-next" (click)="next()">
        Next<i class="fas fa-arrow-right ms-1"></i>
      </button>
      <button *ngIf="currentIndex === quiz.questions.length - 1" class="btn-nav btn-submit" (click)="submit()" [disabled]="submitting">
        <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
        <i *ngIf="!submitting" class="fas fa-check me-1"></i>Submit Quiz
      </button>
    </div>
  </div>
</div>
<app-footer></app-footer>
