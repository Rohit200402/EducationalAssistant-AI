<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header">
    <h2>Response Detail</h2>
    <p>View the full AI response to your question</p>
  </div>

  <!-- Skeleton Loading -->
  <div *ngIf="loading" class="animate-fade-in">
    <div class="detail-card">
      <div class="detail-card-body">
        <div class="skeleton skeleton-text" style="width: 80%; height: 20px; margin-bottom: 12px;"></div>
        <div class="skeleton skeleton-text" style="width: 40%; height: 14px;"></div>
      </div>
    </div>
    <div class="detail-card" style="margin-top: var(--space-4);">
      <div class="detail-card-body">
        <div class="skeleton skeleton-text" style="width: 100%; height: 16px; margin-bottom: 8px;" *ngFor="let s of [1,2,3,4,5]"></div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && request" class="animate-fade-in">
    <!-- Question Card -->
    <div class="question-card">
      <div class="question-card-icon"><i class="fas fa-question-circle"></i></div>
      <div class="question-card-content">
        <h5>{{ request.query }}</h5>
        <div class="question-meta">
          <span class="meta-badge">{{ request.categoryName }}</span>
          <span class="meta-date">{{ request.requestedOn | date:'medium' }}</span>
        </div>
      </div>
    </div>

    <!-- Responses Header -->
    <div class="responses-header">
      <h5><i class="fas fa-robot me-2"></i>Responses ({{ responses.length }})</h5>
      <div class="responses-header-actions">
        <button class="btn-compare" *ngIf="responses.length >= 2" (click)="toggleCompare()" [class.active]="compareMode">
          <i class="fas fa-columns me-1"></i>{{ compareMode ? 'Exit Compare' : 'Compare' }}
        </button>
        <button class="btn-regenerate" (click)="regenerate()" [disabled]="regenerating">
          <span *ngIf="regenerating" class="spinner-border spinner-border-sm me-1"></span>
          <i *ngIf="!regenerating" class="fas fa-redo me-1"></i>Regenerate
        </button>
      </div>
    </div>

    <!-- Compare Mode -->
    <div *ngIf="compareMode && responses.length >= 2" class="compare-container">
      <div class="compare-panel">
        <div class="compare-panel-header">
          <select [(ngModel)]="compareLeft" class="compare-select">
            <option *ngFor="let r of responses; let i = index" [value]="i">{{ getVersionLabel(i) }} - {{ r.createdAt | date:'short' }}</option>
          </select>
        </div>
        <div class="compare-panel-body">
          <div class="markdown-content" [innerHTML]="responses[compareLeft]?.response"></div>
        </div>
      </div>
      <div class="compare-panel">
        <div class="compare-panel-header">
          <select [(ngModel)]="compareRight" class="compare-select">
            <option *ngFor="let r of responses; let i = index" [value]="i">{{ getVersionLabel(i) }} - {{ r.createdAt | date:'short' }}</option>
          </select>
        </div>
        <div class="compare-panel-body">
          <div class="markdown-content" [innerHTML]="responses[compareRight]?.response"></div>
        </div>
      </div>
    </div>

    <!-- Normal Response Cards -->
    <div *ngIf="!compareMode">
      <div *ngFor="let r of responses; let i = index" class="response-card">
        <div class="response-card-header">
          <div class="response-version">
            <span class="version-badge">{{ getVersionLabel(i) }}</span>
            <span class="response-time"><i class="fas fa-clock me-1"></i>{{ r.createdAt | date:'medium' }}</span>
          </div>
          <div class="response-actions">
            <app-copy-button [text]="r.response"></app-copy-button>
            <app-export-button [responseId]="r.aiResponseId" label="Export" btnClass="btn-outline-secondary btn-sm"></app-export-button>
            <button class="btn-bookmark" (click)="bookmark(r.aiResponseId)"><i class="fas fa-bookmark"></i></button>
          </div>
        </div>
        <div class="response-content">
          <div class="markdown-content" [innerHTML]="r.response"></div>
        </div>
        <div class="response-card-footer">
          <app-star-rating
            [rating]="ratings[r.aiResponseId]?.user || 0"
            [averageRating]="ratings[r.aiResponseId]?.average || 0"
            [totalRatings]="ratings[r.aiResponseId]?.total || 0"
            (ratingChange)="rateResponse(r.aiResponseId, $event)">
          </app-star-rating>
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
