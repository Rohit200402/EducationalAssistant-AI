<app-user-navbar></app-user-navbar>
<div class="content-wrapper">
  <div class="page-header"><h2><i class="fas fa-eye me-2"></i>Response Detail</h2></div>
  <div *ngIf="loading" class="loading-spinner"><div class="spinner"></div></div>
  <div *ngIf="!loading && request">
    <div class="card mb-3"><div class="card-body"><h5><i class="fas fa-question-circle me-2 text-primary"></i>{{ request.query }}</h5><small class="text-muted">{{ request.categoryName }} | {{ request.requestedOn | date:'medium' }}</small></div></div>
    <div class="d-flex justify-content-between mb-3"><h5>Responses ({{ responses.length }})</h5><button class="btn btn-outline-primary btn-sm" (click)="regenerate()" [disabled]="regenerating"><span *ngIf="regenerating" class="spinner-border spinner-border-sm me-1"></span><i *ngIf="!regenerating" class="fas fa-redo me-1"></i>Regenerate</button></div>
    <div *ngFor="let r of responses" class="card mb-3"><div class="card-body">
      <div class="d-flex justify-content-between"><small class="text-muted">{{ r.createdAt | date:'medium' }}</small><div class="d-flex gap-2"><app-export-button [responseId]="r.aiResponseId" label="Export" btnClass="btn-outline-secondary btn-sm"></app-export-button><button class="btn btn-sm btn-outline-warning" (click)="bookmark(r.aiResponseId)"><i class="fas fa-bookmark"></i></button></div></div>
      <div class="markdown-content mt-2" [innerHTML]="r.response"></div>
    </div></div>
  </div>
</div>
<app-footer></app-footer>
